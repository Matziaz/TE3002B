# Color Detection Parameters for Traffic Light Recognition
# HSV Color Space Thresholds

color_detector_node:
  ros__parameters:
    # Red thresholds (bimodal: low and high hue)
    red_lower_h: 0
    red_upper_h: 10
    red_lower_h2: 170
    red_upper_h2: 180
    red_lower_s: 50
    red_upper_s: 255
    red_lower_v: 50
    red_upper_v: 255

    # Yellow thresholds
    yellow_lower_h: 20
    yellow_upper_h: 40
    yellow_lower_s: 50
    yellow_upper_s: 255
    yellow_lower_v: 50
    yellow_upper_v: 255

    # Green thresholds
    green_lower_h: 40
    green_upper_h: 80
    green_lower_s: 50
    green_upper_s: 255
    green_lower_v: 50
    green_upper_v: 255

    # Robustness parameters
    min_blob_size: 100
    dominance_ratio: 1.25
    morphology_kernel_size: 5
    history_length: 5
    camera_topic: '/image_raw'
