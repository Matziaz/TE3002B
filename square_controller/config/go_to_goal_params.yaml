go_to_goal_node:
  ros__parameters:
    use_sim_time: true

    cmd_vel_topic: "/cmd_vel"
    odom_topic: "/odom"
    goal_topic: "/goal_pose"
    control_rate: 20.0

    goal_x: 1.0
    goal_y: 0.0
    listen_goal_topic: false

    distance_tolerance: 0.05
    heading_tolerance: 0.05
    settle_time: 0.5

    max_linear_speed: 0.35
    max_angular_speed: 1.2
    min_linear_speed: 0.03
    min_angular_speed: 0.05

    kp_linear: 0.8
    ki_linear: 0.0
    kd_linear: 0.0

    kp_angular: 2.5
    ki_angular: 0.0
    kd_angular: 0.0

    linear_integral_limit: 0.8
    angular_integral_limit: 1.0
    turn_in_place_threshold: 0.8
