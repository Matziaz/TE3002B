square_controller:
  ros__parameters:
    mode: "pid"

    # Geometria de la trayectoria (cuadrado)
    side_length: 2.0
    start_x: 0.0
    start_y: 0.0
    start_theta: 0.0

    # Topicos ROS
    use_sim_time: false
    cmd_vel_topic: "/cmd_vel"
    odom_topic: "/odom"
    control_rate: 20.0

    # Tolerancias
    distance_tolerance: 0.05
    heading_tolerance: 0.06
    heading_priority_threshold: 0.45
    goal_settle_time: 0.25
    heading_settle_time: 0.20

    # Limites de velocidad
    max_linear_speed: 0.25
    max_angular_speed: 0.80
    min_linear_speed: 0.05
    min_angular_speed: 0.10
    command_slew_rate_linear: 0.40
    command_slew_rate_angular: 1.20

    # PID lineal (distancia)
    kp_linear: 0.90
    ki_linear: 0.02
    kd_linear: 0.08

    # PID angular (orientacion)
    kp_angular: 2.80
    ki_angular: 0.04
    kd_angular: 0.16

    # Robustez del PID
    linear_integral_limit: 0.50
    angular_integral_limit: 0.80
    derivative_filter_alpha: 0.80
    linear_deadband: 0.005
    angular_deadband: 0.010

    # Filtrado de odometria
    pose_filter_alpha: 0.75
    odom_timeout: 0.50

    # Sintonia adaptativa
    tuning_distance_scale: 0.75
    tuning_heading_scale: 0.50
    linear_far_gain_scale: 1.20
    linear_near_gain_scale: 0.70
    angular_far_gain_scale: 1.10
    angular_near_gain_scale: 0.85
    linear_alignment_gain: 0.85
    turn_in_place_threshold: 0.35

    # Pausas para medicion
    initial_stop_time: 2.0
    point_stop_time: 2.0
    final_stop_time: 2.0
