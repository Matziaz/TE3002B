path_generator_node:
  ros__parameters:
    mode: "time"               # "time" o "speed"
    cmd_vel_topic: "/cmd_vel"
    control_rate: 20.0

    # Límites del robot
    max_linear_speed: 0.25
    max_angular_speed: 0.80
    min_linear_speed: 0.05
    min_angular_speed: 0.10

    # Usados cuando mode = "speed"
    linear_speed: 0.15
    angular_speed: 0.35

    # Pausas para que puedan medir error en video
    initial_stop_time: 2.0
    point_stop_time: 2.0
    final_stop_time: 2.0

    # Geofencing opcional
    use_geofence: true
    min_x: -0.50
    max_x: 3.00
    min_y: -0.50
    max_y: 3.00

    # Pose inicial asumida del robot
    start_x: 0.0
    start_y: 0.0
    start_theta: 0.0

    # Ruta ejemplo
    # En modo "time", cada punto debe traer time_to_wp
    waypoints_json: >
      [
        {"x": 1.00, "y": 0.50, "time_to_wp": 8.0},
        {"x": 2.00, "y": 1.50, "time_to_wp": 10.0},
        {"x": 1.20, "y": 2.20, "time_to_wp": 9.0},
        {"x": 0.30, "y": 1.00, "time_to_wp": 8.5}
      ]
