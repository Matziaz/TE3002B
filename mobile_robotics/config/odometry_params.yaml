odometry_node:
  ros__parameters:
    use_sim_time: true

    # ========== ENCODER TOPICS ==========
    # Subscribes to angular velocities (ω_R, ω_L) in rad/s
    right_wheel_topic: "/VelocityEncR"   # Right wheel angular velocity (ω_R)
    left_wheel_topic: "/VelocityEncL"    # Left wheel angular velocity (ω_L)
    odom_topic: "/odom"                  # Publish: odometry with pose (x, y, θ)

    # ========== ODOMETRY PARAMETERS ==========
    publish_rate: 50.0                   # Odometry update frequency (Hz)
    r: 0.05                              # Wheel radius (meters)
    b: 0.19                              # Wheel base / axle length (meters)
    encoders_are_angular_speed: true     # If true: encoders give ω; if false: give v directly

    # ========== INITIAL POSE ==========
    x_0: 0.0                             # Initial x position (meters)
    y_0: 0.0                             # Initial y position (meters)
    theta_0: 0.0                         # Initial orientation (radians)

    # ========== FRAME IDENTIFIERS ==========
    odom_frame_id: "odom"                # Reference frame
    base_frame_id: "base_link"           # Robot frame
    
    # ========== TIMEOUT ==========
    encoder_timeout_seconds: 0.5         # If no encoder data for this long, assume zero velocity
