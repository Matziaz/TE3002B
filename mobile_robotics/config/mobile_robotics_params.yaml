differential_drive_controller:
  ros__parameters:
    use_sim_time: true
    
    right_wheel_encoder_topic: "/right_wheel_encoder"
    left_wheel_encoder_topic: "/left_wheel_encoder"
    robot_odometry_topic: "/robot_odometry"
    robot_linear_velocity_topic: "/robot_linear_velocity"
    robot_angular_velocity_topic: "/robot_angular_velocity"
    velocity_estimate_topic: "/velocity_estimate"
    velocity_command_topic: "/velocity_command"
    navigation_goal_topic: "/navigation_goal"
    
    odometry_update_rate: 50.0
    velocity_estimation_rate: 20.0
    control_loop_rate: 20.0
    
    wheel_radius: 0.05
    wheel_base: 0.19
    encoders_are_angular_speed: true
    
    initial_x: 0.0
    initial_y: 0.0
    initial_heading: 0.0
    
    odometry_frame: "odom"
    robot_frame: "base_link"
    encoder_timeout: 0.5
    
    goal_x: 1.0
    goal_y: 0.0
    use_dynamic_goals: false
    
    distance_tolerance: 0.05
    heading_tolerance: 0.05
    goal_settle_time: 0.5
    
    max_linear_velocity: 0.35
    max_angular_velocity: 1.2
    min_linear_velocity: 0.03
    min_angular_velocity: 0.05
    
    k_v: 0.8
    k_omega: 2.5
    rotation_threshold: 0.8
