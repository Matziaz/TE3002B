encoder_simulator:
  ros__parameters:
    velocity_command_topic: '/cmd_vel'
    right_wheel_encoder_topic: '/right_wheel_encoder'
    left_wheel_encoder_topic: '/left_wheel_encoder'
    simulation_rate: 50.0
    wheel_radius: 0.05
    wheel_base: 0.19

odometry_speed_estimator:
  ros__parameters:
    right_wheel_encoder_topic: '/right_wheel_encoder'
    left_wheel_encoder_topic: '/left_wheel_encoder'
    robot_odometry_topic: '/robot_odometry'
    robot_linear_velocity_topic: '/robot_linear_velocity'
    robot_angular_velocity_topic: '/robot_angular_velocity'
    velocity_estimate_topic: '/velocity_estimate'
    odometry_update_rate: 50.0
    velocity_estimation_rate: 20.0
    wheel_radius: 0.05
    wheel_base: 0.19
    encoders_are_angular_speed: true
    initial_x: 0.0
    initial_y: 0.0
    initial_heading: 0.0
    odometry_frame: 'odom'
    robot_frame: 'base_link'
    encoder_timeout: 0.5

go_to_goal_controller:
  ros__parameters:
    robot_odometry_topic: '/robot_odometry'
    velocity_command_topic: '/cmd_vel'
    control_loop_rate: 20.0
    goal_x: 1.0
    goal_y: 0.0
    use_dynamic_goals: false
    dynamic_goal_topic: '/goal_pose'
    proportional_velocity_gain: 0.8
    proportional_angular_gain: 2.5
    max_linear_velocity: 0.5
    max_angular_velocity: 1.5
    linear_velocity_limit: 0.5
    angular_velocity_limit: 1.5
    distance_tolerance: 0.05
    heading_tolerance: 0.1
