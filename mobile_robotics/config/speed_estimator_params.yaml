speed_estimator_node:
  ros__parameters:
    use_sim_time: true

    # ========== ENCODER TOPICS (INPUTS) ==========
    # Subscribes to angular velocities (ω_R, ω_L) in rad/s
    right_wheel_topic: "/VelocityEncR"   # Right wheel angular velocity (ω_R)
    left_wheel_topic: "/VelocityEncL"    # Left wheel angular velocity (ω_L)

    # ========== OUTPUT TOPICS ==========
    linear_speed_topic: "/puzzlebot/linear_speed"      # Publish: v (linear velocity)
    angular_speed_topic: "/puzzlebot/angular_speed"    # Publish: ω (angular velocity)
    estimated_twist_topic: "/puzzlebot/estimated_twist" # Publish: Twist message (v, ω)

    # ========== UPDATE FREQUENCY ==========
    publish_rate: 20.0                   # Speed estimation frequency (Hz)

    # ========== ROBOT KINEMATIC PARAMETERS ==========
    r: 0.05                              # Wheel radius (meters)
    b: 0.19                              # Wheel base / axle length (meters)
    encoders_are_angular_speed: true     # If true: encoders give ω_R, ω_L; if false: give v_R, v_L

    # ========== TIMEOUT & LOGGING ==========
    timeout_seconds: 0.5                 # If no encoder data for this long, output zero velocity
    log_rate_hz: 2.0                     # Diagnostic logging frequency (Hz)
